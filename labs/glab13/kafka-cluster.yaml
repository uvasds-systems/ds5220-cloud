##
## Headless Service — provides stable DNS names for each Kafka broker
## (kafka-0.kafka-headless.kafka.svc.cluster.local, etc.)
##
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
  labels:
    app: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
  selector:
    app: kafka
---
##
## ClusterIP Service — a single entry point for clients inside the cluster
##
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
  selector:
    app: kafka
---
##
## ConfigMap — shared Kafka KRaft configuration
##
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: kafka
data:
  KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_LOG_RETENTION_HOURS: "1"
---
##
## StatefulSet — three Kafka broker/controller nodes in KRaft mode
##
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          envFrom:
            - configMapRef:
                name: kafka-config
          env:
            ##
            ## The pod name (kafka-0, kafka-1, kafka-2) is injected so
            ## the start-up script can derive a unique node ID and
            ## build the correct advertised listener.
            ##
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/bash
            - -c
            - |
              # Extract the ordinal index from the pod name (e.g. kafka-1 -> 1)
              export ORDINAL=${POD_NAME##*-}
              export KAFKA_NODE_ID=$ORDINAL

              # Every node acts as both broker AND controller
              export KAFKA_PROCESS_ROLES="broker,controller"

              # Controller quorum voters — all three nodes
              export KAFKA_CONTROLLER_QUORUM_VOTERS="0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093"

              # Listeners & advertised listeners
              export KAFKA_LISTENERS="PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${POD_NAME}.kafka-headless.kafka.svc.cluster.local:9092,CONTROLLER://${POD_NAME}.kafka-headless.kafka.svc.cluster.local:9093"

              # Log directory
              export KAFKA_LOG_DIRS="/tmp/kraft-combined-logs"

              # Build a concrete runtime config from scratch so the image
              # defaults cannot override listener values.
              cat > /tmp/server.properties <<EOF
              process.roles=$KAFKA_PROCESS_ROLES
              node.id=$KAFKA_NODE_ID
              controller.quorum.voters=$KAFKA_CONTROLLER_QUORUM_VOTERS
              listeners=$KAFKA_LISTENERS
              advertised.listeners=$KAFKA_ADVERTISED_LISTENERS
              inter.broker.listener.name=$KAFKA_INTER_BROKER_LISTENER_NAME
              controller.listener.names=$KAFKA_CONTROLLER_LISTENER_NAMES
              listener.security.protocol.map=$KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              log.dirs=$KAFKA_LOG_DIRS
              num.partitions=$KAFKA_NUM_PARTITIONS
              offsets.topic.replication.factor=$KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              default.replication.factor=$KAFKA_DEFAULT_REPLICATION_FACTOR
              transaction.state.log.replication.factor=3
              transaction.state.log.min.isr=2
              log.retention.hours=$KAFKA_LOG_RETENTION_HOURS
              EOF

              # Format the storage directory using the same runtime config
              # Kafka will start with. This keeps node.id consistent with the
              # stored metadata for each broker.
              /opt/kafka/bin/kafka-storage.sh format \
                --config /tmp/server.properties \
                --cluster-id "$CLUSTER_ID" \
                --ignore-formatted

              # Start Kafka from the generated runtime config.
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
